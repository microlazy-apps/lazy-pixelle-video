application:
  subdomain: pixelle-video
  upstreams:
    - location: /
      backend: http://main:8501
  public_path:
    - /
  health_check:
    test_url: http://main:8501/_stcore/health
    timeout: 10s
    start_period: 60s

services:
  main:
    image: ${LAZYCAT_IMAGE}
    environment:
      - TZ=Asia/Shanghai
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false
      - STREAMLIT_SERVER_ENABLE_XSRF_PROTECTION=false
      - STREAMLIT_SERVER_ENABLE_CORS=false
    binds:
      - /lzcapp/var/persist:/app/persist
      - /lzcapp/var/data:/app/data
      - /lzcapp/var/output:/app/output
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
